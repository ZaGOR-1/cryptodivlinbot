# Run the bot in production with `docker compose up -d`.
# State (SQLite DB) persists in the named volume `cryptodivlinbot_data`.
services:
  bot:
    build:
      context: .
      dockerfile: Dockerfile
    image: cryptodivlinbot:latest
    container_name: cryptodivlinbot
    # Auto-restart on every kind of failure: process crash, OOM kill,
    # daemon restart, host reboot. ``unless-stopped`` is preferred over
    # ``always`` because it respects an explicit ``docker stop`` (we
    # don't want a manually-stopped container to come back when the
    # daemon restarts).
    restart: unless-stopped
    # Run an init (tini) as PID 1 so SIGTERM is forwarded to the Python
    # process and PTB can shut down gracefully (drain the JobQueue,
    # close the SQLite WAL, etc.) instead of being SIGKILL'd.
    init: true
    # Give PTB enough time to finish its current poll cycle and run the
    # JobQueue shutdown. Default is 10s which is occasionally too tight
    # under network latency.
    stop_grace_period: 30s
    # Pull config from a `.env` file next to this compose file.
    # Required: TELEGRAM_BOT_TOKEN. All other vars have sensible defaults.
    env_file:
      - .env
    environment:
      # Pin the DB path inside the container; must match the mount below.
      DB_PATH: /data/cryptodivlinbot.sqlite
      # Snapshots live alongside the live DB on the same persistent volume,
      # so a `docker compose down -v` wipes both — but a normal restart
      # leaves the rotated history intact.
      BACKUP_DIR: /data/backups
    volumes:
      - cryptodivlinbot_data:/data
    # Honour the HEALTHCHECK declared in the Dockerfile.
    healthcheck:
      test: ["CMD", "python", "-c", "import cryptodivlinbot, cryptodivlinbot.config"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    # Conservative resource caps; tune for your host.
    deploy:
      resources:
        limits:
          memory: 256M
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"

volumes:
  cryptodivlinbot_data:
    name: cryptodivlinbot_data
